name: News Tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch news
        env:
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Fetch events
        env:
          COINMARKETCAL_API_KEY: ${{ secrets.COINMARKETCAL_API_KEY }}
        run: python scripts/fetch_events.py

      - name: Analyze news
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
        run: python scripts/analyze_news.py

      - name: Commit & push updated data
        run: |
          git config user.name "news-tracker-bot"
          git config user.email "actions@github.com"
          git add data/news.json data/events.json data/analysis.json
          git diff --quiet --cached || git commit -m "Update news & analysis [skip ci]"
          git push
