name: Whale Tracker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run whale tracker
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          BSCSCAN_API_KEY: ${{ secrets.BSCSCAN_API_KEY }}
          THRESHOLD_USD: "1000000"
        run: python scripts/fetch_whales.py

      - name: Commit & push updated data
        run: |
          git config user.name "whale-tracker-bot"
          git config user.email "actions@github.com"
          git add data/whales.json data/state.json data/signal.json
          git diff --quiet --cached || git commit -m "Update whale data [skip ci]"
          git push
