<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

</head>
<body>

<nav class="nav">
  <div class="nav-brand">DIDINSKA<span class="dot">.</span></div>
  <div class="nav-links">
    <a href="index.html">Beranda</a>
    <a href="jadwal.html" class="active">Jadwal News</a>
    <a href="analisa.html">Analisa News</a>
  </div>
</nav>

<div class="wrap">
  <section class="hero" style="padding-top:20px;">
    <h1 style="font-size:28px;">Jadwal News</h1>
    <p>Pantau event yang akan datang.</p>
  </section>

  <div class="section-label">Akan terjadi</div>
  <div id="list-akan" class="loading">Memuat jadwal…</div>

  <footer>
    🏛️ = jadwal ekonomi/makro (manual, dari sumber resmi) &middot; 🪙 = hasil pencarian berita, cek ulang di sumber resmi.
  </footer>
</div>

<script src="data/jadwal.js"></script>
<script src="assets/app.js"></script>
<script>
// Sprint 12: jadwal event ekonomi/makro sekarang murni statis, dibaca
// langsung dari data/jadwal.js (window.ECONOMIC_EVENTS) — TANPA request
// ke Worker/API sama sekali.
function loadAkanTerjadi() {
  const el = document.getElementById("list-akan");
  try {
    const manual = getManualEconomicEvents();
    if (!manual.length) { el.innerHTML = '<div class="empty">Belum ada jadwal event mendatang. Jadwal dikelola manual — cek lagi nanti.</div>'; return; }
    el.innerHTML = manual.map((it) => eventCardHtml(it)).join("");
  } catch (e) {
    el.innerHTML = `<div class="empty">Gagal memuat jadwal: ${escapeHtml(e.message)}</div>`;
  }
}

loadAkanTerjadi();
</script>
</body>
</html>
